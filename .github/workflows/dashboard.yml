name: dashboard

on:
  # Rebuild after each pipeline run deposits new data
  workflow_run:
    workflows: ["pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Only run if the pipeline succeeded (or on manual trigger)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -e .

      - name: Restore database from data branch
        run: |
          git fetch origin data
          git show origin/data:ontario_grid.duckdb > ontario_grid.duckdb
          echo "Database: $(du -sh ontario_grid.duckdb | cut -f1)"

      - name: Export Parquet files
        run: python scripts/export_parquet.py

      - name: Install Observable Framework
        run: npm install
        working-directory: dashboard

      - name: Build dashboard
        run: npm run build
        working-directory: dashboard

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
