name: Deploy Evidence Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'

  schedule:
    - cron: '0 6 * * *'  # Daily at 6am

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch database from data branch
        run: |
          git fetch origin data
          git checkout origin/data -- ontario_grid.duckdb
          mv ontario_grid.duckdb dashboard/sources/ontario_grid/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Dashboard URLs
        run: |
          echo "🎉 Dashboard published!"
          echo "Base URL: ${{ steps.deployment.outputs.page_url }}"
          echo ""
          echo "Ontario Grid Dashboard:"
          echo "  - Index: ${{ steps.deployment.outputs.page_url }}"
          echo "  - History: ${{ steps.deployment.outputs.page_url }}history"
          echo "  - Rates: ${{ steps.deployment.outputs.page_url }}rates"
