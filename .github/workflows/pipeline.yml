name: pipeline

on:
  schedule:
    # Gridwatch updates hourly - check at :05 past each hour to catch new data
    - cron: '5 * * * *'
    # OEB rates change quarterly - daily check is sufficient
    - cron: '0 8 * * *'
    # IESO publishes monthly - check weekly on Mondays
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Sources to run (space-separated: ieso gridwatch oeb). Empty = all.'
        required: false
        default: ''
      full_refresh:
        description: 'Replace all data (full refresh)'
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -v

  run:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Restore database from data branch
        run: |
          if git ls-remote --heads origin data | grep -q refs/heads/data; then
            git fetch origin data
            if git show origin/data:ontario_grid.duckdb > ontario_grid.duckdb 2>/dev/null; then
              echo "Database restored ($(du -sh ontario_grid.duckdb | cut -f1))"
            else
              echo "Restore failed — starting fresh"
              rm -f ontario_grid.duckdb
            fi
          else
            echo "No data branch yet — first run, starting fresh"
          fi

      - name: Determine which sources to run
        id: sources
        run: |
          # Manual workflow_dispatch takes precedence
          if [ -n "${{ github.event.inputs.sources }}" ]; then
            SOURCES="${{ github.event.inputs.sources }}"
            echo "mode=manual" >> $GITHUB_OUTPUT
          # Scheduled runs - match each source to its optimal frequency
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "5 * * * *")
                SOURCES="gridwatch"
                echo "mode=hourly_gridwatch" >> $GITHUB_OUTPUT
                ;;
              "0 8 * * *")
                SOURCES="oeb"
                echo "mode=daily_oeb" >> $GITHUB_OUTPUT
                ;;
              "0 9 * * 1")
                SOURCES="ieso"
                echo "mode=weekly_ieso" >> $GITHUB_OUTPUT
                ;;
              *)
                SOURCES="gridwatch"
                echo "mode=fallback" >> $GITHUB_OUTPUT
                ;;
            esac
          else
            SOURCES="ieso gridwatch oeb"
            echo "mode=all" >> $GITHUB_OUTPUT
          fi
          echo "sources=$SOURCES" >> $GITHUB_OUTPUT
          echo "Running sources: $SOURCES (mode: $mode)"

      - name: Run dlt pipeline
        run: |
          SOURCES="${{ steps.sources.outputs.sources }}"
          FULL_REFRESH="${{ github.event.inputs.full_refresh }}"

          echo "=== Pipeline Run: ${{ steps.sources.outputs.mode }} ==="
          echo "Sources: $SOURCES"
          echo "Full refresh: ${FULL_REFRESH:-false}"

          for SOURCE in $SOURCES; do
            echo ""
            echo "--- Processing: $SOURCE ---"
            python pipeline.py --sources $SOURCE --skip-dbt \
              $( [ "$FULL_REFRESH" = "true" ] && echo "--full-refresh" ) || \
              echo "⚠️  WARNING: source $SOURCE failed, continuing"
          done

      - name: Run dbt transforms
        run: dbt run --project-dir transform --profiles-dir transform

      - name: Run dbt tests
        run: dbt test --project-dir transform --profiles-dir transform --store-failures

      - name: Push database to data branch (single-commit force-push)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TMPDB=$(mktemp --suffix=.duckdb)
          cp ontario_grid.duckdb "$TMPDB"

          git checkout --orphan _data_tmp
          git rm -rf . --quiet

          cp "$TMPDB" ontario_grid.duckdb
          git add -f ontario_grid.duckdb

          # Include which sources ran in commit message
          SOURCES="${{ steps.sources.outputs.sources }}"
          MODE="${{ steps.sources.outputs.mode }}"
          git commit -m "data: $(date -u +%Y-%m-%dT%H:%M:%SZ) [$MODE: $SOURCES] [skip ci]"

          git push origin HEAD:data --force
          rm -f "$TMPDB"

          echo "✅ Database updated and pushed (sources: $SOURCES)"
